workflows:
  lamafia-android-apk:
    name: Lamafia Android APK Build
    # instance_type: linux_x2

    environment:
      flutter: stable
      groups:
      - cm_credentials  # grupo de credenciais configurado na UI (keystore)
        # - google_play_credentials  # descomente se usar Play Store
      # vars:
       # CM_KEYSTORE_PASSWORD: lidcloned
      #  CM_KEY_ALIAS: Minhachaveappl
      #  CM_KEY_PASSWORD: lidcloned
       # GOOGLE_SERVICES_JSON: "Encrypted(...)"  # apenas se for usar como variável segura

    scripts:
      - name: Set up local properties
        script: |
          echo "flutter.sdk=$FLUTTER_ROOT" > "$CM_BUILD_DIR/android/local.properties"

      # Descomente abaixo se for usar GOOGLE_SERVICES_JSON como variável segura
      - name: Decode google-services.json
        script: |
          echo $GOOGLE_SERVICES_JSON | base64 --decode > $CM_BUILD_DIR/android/app/google-services.json
          echo "google-services.json created in android/app/"

      - name: Set up keystore
        script: |
          if [ -z "$CM_KEYSTORE_PATH" ]; then
            echo "Erro: Caminho do Keystore (CM_KEYSTORE_PATH) não definido nas variáveis de ambiente do Codemagic."
            exit 1
          fi
          echo "storeFile=$CM_KEYSTORE_PATH" > $CM_BUILD_DIR/android/key.properties
          echo "storePassword=$CM_KEYSTORE_PASSWORD" >> $CM_BUILD_DIR/android/key.properties
          echo "keyAlias=$CM_KEY_ALIAS" >> $CM_BUILD_DIR/android/key.properties
          echo "keyPassword=$CM_KEY_PASSWORD" >> $CM_BUILD_DIR/android/key.properties
          echo "Keystore properties written to android/key.properties"

      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Build Android APK
        script: |
          flutter clean
          flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
